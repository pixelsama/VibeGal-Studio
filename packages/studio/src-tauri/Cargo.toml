[package]
name = "vibegal-studio"
version = "0.1.0-alpha.1"
description = "Graph-first galgame studio and live preview editor"
authors = ["pixelsama"]
license = "AGPL-3.0-or-later"
repository = "https://github.com/pixelsama/VibeGal-Studio"
edition = "2021"
rust-version = "1.85.0"
default-run = "vibegal-studio"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "vibegal-studio"
path = "src/main.rs"

[[bin]]
name = "vibegal-cli"
path = "src/bin/cli.rs"

[[bin]]
name = "vibegal-player-tauri"
path = "src/bin/player_tauri.rs"

[build-dependencies]
tauri-build = { version = "2.6.3", features = [] }
serde_json = "1.0"
sha2 = "0.10"

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
sha2 = "0.10"
log = "0.4"
notify = "6.1"
tauri = { version = "2.11.3", features = ["protocol-asset"] }
tauri-plugin-log = "2"
tauri-plugin-dialog = "2"
clap = { version = "4", features = ["derive"] }
base64 = "0.22"
jsonschema = { version = "=0.33.0", default-features = false }
percent-encoding = "2"
uuid = { version = "1", features = ["v4"] }
