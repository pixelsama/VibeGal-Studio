name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  app-frontend:
    name: Frontend & CLI scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Frontend build
        run: pnpm --filter @galstudio/studio build

      - name: Engine schema export + drift check
        run: pnpm run check:schemas

      - name: Version consistency check
        run: pnpm run check:versions

      - name: Release smoke scripts
        run: pnpm smoke:release

  app-tauri:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Rust test
        working-directory: packages/studio/src-tauri
        run: cargo test

      - name: Rust build
        working-directory: packages/studio/src-tauri
        run: cargo build
