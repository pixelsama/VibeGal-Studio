name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  app-frontend:
    name: Frontend & CLI scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Frontend build
        run: pnpm --filter @vibegal/studio build

      - name: Engine schema export + drift check
        run: pnpm run check:schemas

      - name: Default renderer drift check
        run: pnpm run check:renderer-template

      - name: Version consistency check
        run: pnpm run check:versions

      - name: Release smoke scripts
        run: pnpm smoke:release

      - name: Build sample web export
        run: cargo run --manifest-path packages/studio/src-tauri/Cargo.toml --bin vibegal-cli -- build examples/sample-novel --target web --out "$RUNNER_TEMP/vibegal-web" --format json

      - name: Browser behavior smoke
        run: cargo run --manifest-path packages/studio/src-tauri/Cargo.toml --bin vibegal-cli -- smoke "$RUNNER_TEMP/vibegal-web" --target web --format json

  app-tauri:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Rust test
        working-directory: packages/studio/src-tauri
        run: cargo test

      - name: Rust build
        working-directory: packages/studio/src-tauri
        run: cargo build

  desktop-bundle:
    name: Desktop bundle (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: pnpm tauri build

      - name: Smoke app-bundled CLI (macOS)
        if: runner.os == 'macOS'
        run: packages/studio/src-tauri/target/release/bundle/macos/VibeGal-Studio.app/Contents/MacOS/vibegal-cli build examples/sample-novel --target web --out "$RUNNER_TEMP/vibegal-installed-cli-web" --format json

      - name: Smoke bundled CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem packages/studio/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          $installDir = Join-Path $env:RUNNER_TEMP "VibeGal-Studio"
          & $installer.FullName /S "/D=$installDir"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & (Join-Path $installDir "vibegal-cli.exe") build examples/sample-novel --target web --out (Join-Path $env:RUNNER_TEMP "vibegal-installed-cli-web") --format json
