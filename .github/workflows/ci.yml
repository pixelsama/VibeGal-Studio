name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-frontend:
    name: Frontend & CLI scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Workspace build
        run: pnpm build

      - name: Contracts generation + schema drift check
        run: pnpm run check:schemas

      - name: Engine types drift check
        run: pnpm run check:engine-types

      - name: Default renderer drift check
        run: pnpm run check:renderer-template

      - name: Version consistency check
        run: pnpm run check:versions

      - name: Documentation contract check
        run: pnpm run check:doc-contract

      - name: Release smoke scripts
        run: pnpm smoke:release

      - name: Build sample web export
        run: cargo run --manifest-path packages/studio/src-tauri/Cargo.toml --bin vibegal-cli -- build examples/sample-novel --target web --out "$RUNNER_TEMP/vibegal-web" --format json

      - name: Browser behavior smoke
        run: cargo run --manifest-path packages/studio/src-tauri/Cargo.toml --bin vibegal-cli -- smoke "$RUNNER_TEMP/vibegal-web" --target web --format json

  app-tauri:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust test
        working-directory: packages/studio/src-tauri
        run: cargo test --locked

      - name: Rust build
        working-directory: packages/studio/src-tauri
        run: cargo build --locked --bins

  rust-msrv:
    name: Pure Cargo (Rust 1.85.0, locked/offline)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev

      - name: Setup exact MSRV
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Fetch locked dependencies
        run: cargo fetch --locked --manifest-path packages/studio/src-tauri/Cargo.toml

      - name: Check all targets offline
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo check --locked --all-targets --manifest-path packages/studio/src-tauri/Cargo.toml

      - name: Test all Cargo targets offline
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo test --locked --manifest-path packages/studio/src-tauri/Cargo.toml

  desktop-bundle:
    name: Desktop bundle (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: pnpm bundle

      - name: Stage installed CLI smoke artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          STAGE="$RUNNER_TEMP/installed-cli-smoke"
          mkdir -p "$STAGE"
          ditto packages/studio/src-tauri/target/release/bundle/macos/VibeGal-Studio.app "$STAGE/VibeGal App.app"
          ditto examples/sample-novel "$STAGE/Project With Spaces"
          tar -czf "$RUNNER_TEMP/installed-cli-macos.tar.gz" -C "$STAGE" .

      - name: Stage installed CLI smoke artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP "installed-cli-smoke"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          $installer = Get-ChildItem packages/studio/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          Copy-Item $installer.FullName (Join-Path $stage "VibeGal Installer.exe")
          Copy-Item examples/sample-novel (Join-Path $stage "Project With Spaces") -Recurse
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath (Join-Path $env:RUNNER_TEMP "installed-cli-windows.zip")

      - name: Upload installed CLI smoke artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: installed-cli-macOS
          path: ${{ runner.temp }}/installed-cli-macos.tar.gz

      - name: Upload installed CLI smoke artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: installed-cli-Windows
          path: ${{ runner.temp }}/installed-cli-windows.zip

  installed-cli-smoke:
    name: Installed CLI without source (${{ matrix.os }})
    needs: desktop-bundle
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download installed CLI smoke artifact
        uses: actions/download-artifact@v4
        with:
          name: installed-cli-${{ runner.os }}
          path: ${{ runner.temp }}

      - name: Validate installed CLI without Node or source (macOS)
        if: runner.os == 'macOS'
        run: |
          STAGE="$RUNNER_TEMP/installed-cli-smoke"
          mkdir -p "$STAGE"
          tar -xzf "$RUNNER_TEMP/installed-cli-macos.tar.gz" -C "$STAGE"
          CLI="$STAGE/VibeGal App.app/Contents/Resources/bin/vibegal-cli"
          PROJECT="$STAGE/Project With Spaces"
          cd "$RUNNER_TEMP"
          env -i HOME="$HOME" PATH="/usr/bin:/bin" "$CLI" validate "$PROJECT" --format json

      - name: Validate installed CLI without Node or source (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP "installed-cli-smoke"
          Expand-Archive (Join-Path $env:RUNNER_TEMP "installed-cli-windows.zip") -DestinationPath $stage
          $installer = Join-Path $stage "VibeGal Installer.exe"
          $installProcess = Start-Process -FilePath $installer -ArgumentList '/S' -Wait -PassThru
          if ($installProcess.ExitCode -ne 0) { exit $installProcess.ExitCode }
          $installDir = (Get-ItemProperty 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\VibeGal-Studio').InstallLocation.Trim('"')
          $cli = Join-Path $installDir "vibegal-cli.exe"
          $project = Join-Path $stage "Project With Spaces"
          Push-Location $env:RUNNER_TEMP
          $originalPath = $env:PATH
          $env:PATH = "$env:SystemRoot\System32"
          & $cli validate $project --format json
          $exitCode = $LASTEXITCODE
          $env:PATH = $originalPath
          Pop-Location
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Setup Node for installed exporter smoke
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Build and smoke with installed CLI (macOS)
        if: runner.os == 'macOS'
        run: |
          STAGE="$RUNNER_TEMP/installed-cli-smoke"
          CLI="$STAGE/VibeGal App.app/Contents/Resources/bin/vibegal-cli"
          PROJECT="$STAGE/Project With Spaces"
          OUT="$RUNNER_TEMP/VibeGal Export With Spaces"
          cd "$RUNNER_TEMP"
          "$CLI" build "$PROJECT" --target web --out "$OUT" --format json
          "$CLI" smoke "$OUT" --target web --format json
          DESKTOP_OUT="$RUNNER_TEMP/VibeGal Desktop With Spaces"
          "$CLI" build "$PROJECT" --target desktop --runtime tauri --out "$DESKTOP_OUT" --format json
          "$CLI" smoke "$DESKTOP_OUT" --target desktop --runtime tauri --format json

      - name: Build and smoke with installed CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP "installed-cli-smoke"
          $installDir = (Get-ItemProperty 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\VibeGal-Studio').InstallLocation.Trim('"')
          $cli = Join-Path $installDir "vibegal-cli.exe"
          $project = Join-Path $stage "Project With Spaces"
          $outDir = Join-Path $env:RUNNER_TEMP "VibeGal Export With Spaces"
          Push-Location $env:RUNNER_TEMP
          & $cli build $project --target web --out $outDir --format json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $cli smoke $outDir --target web --format json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $desktopOut = Join-Path $env:RUNNER_TEMP "VibeGal Desktop With Spaces"
          & $cli build $project --target desktop --runtime tauri --out $desktopOut --format json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $cli smoke $desktopOut --target desktop --runtime tauri --format json
          $exitCode = $LASTEXITCODE
          Pop-Location
          if ($exitCode -ne 0) { exit $exitCode }
          $uninstaller = Get-ChildItem $installDir -Filter 'uninstall*.exe' | Select-Object -First 1
          if ($uninstaller) {
            $uninstallProcess = Start-Process -FilePath $uninstaller.FullName -ArgumentList '/S' -Wait -PassThru
            if ($uninstallProcess.ExitCode -ne 0) { exit $uninstallProcess.ExitCode }
          }
